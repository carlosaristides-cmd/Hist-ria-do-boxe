<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🥊 História do Boxe</title>
  <!-- CSS externo -->
  <link rel="stylesheet" href="style.css">
  <!-- Font Awesome para ícones -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>

  <header>
    <div class="container">
      <h1><i class="fas fa-boxing-glove"></i> História do Boxe</h1>
      <p>Ícones, lendas e momentos que marcaram o esporte</p>
    </div>
  </header>

  <main class="container">
    <!-- Seção de biografias e cards -->
    <section id="biografias">
      <!-- cada card será inserido via JavaScript -->
    </section>

    <!-- Seção de vídeos do YouTube -->
    <section id="videos">
      <h2><i class="fab fa-youtube"></i> Momentos históricos no YouTube</h2>
      <div class="video-grid" id="videoGrid">
        <!-- vídeos inseridos via JS -->
      </div>
    </section>

    <!-- Seção de fotografias -->
    <section id="fotos">
      <h2><i class="fas fa-camera-retro"></i> Fotografias lendárias</h2>
      <div class="foto-grid" id="fotoGrid">
        <!-- fotos inseridas via JS -->
      </div>
    </section>
  </main>

  <footer>
    <div class="container">
      <p>&copy; 2025 - Projeto História do Boxe | Repositório GitHub</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
